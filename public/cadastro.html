<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AquaTech | Cadastro</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Krona+One&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="ft_e_nm">
      <a href="index.html">
        <img
          src="assets/icones/log-sem-fundo.png"
          style="height: 90px; width: 80px"
        />
      </a>
      <span>
        <span style="color: #f65d09">Orange</span>
        <span class="cat">Cat</span></span
      >
    </div>
    <div class="container_lec">
      <div class="lec_esquerdo_ipt">
        <h2>Bem vindo!</h2>
        <div class="ipts_lg">
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>Email:</span>
            <input type="text" id="email_input" placeholder="Email" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input type="password" id="senha_input" placeholder="Senha" />
          </div>
          <div class="campo">
            <span>Confirme a senha:</span>
            <input
              id="confirmacao_senha_input"
              type="password"
              placeholder="******"
            />
          </div>
        </div>
        <br />
        <button onclick="cadastrar()">Cadastrar</button><br />
        <a id="jaTem" href="uplArquivo.html"
          >Já tem uma conta?&nbsp;<b>Fazer login</b></a
        >
      </div>
      <div class="lec_direito_img">
        <img src="assets/img/weasley_login.jpeg" />
      </div>
    </div>
  </body>
</html>

<script>
  let caracteresEspeciais = [
    "!",
    "?",
    ".",
    ",",
    ";",
    ":",
    "@",
    "#",
    "$",
    "%",
    "&",
    "*",
    "+",
    "-",
    "=",
    "(",
    ")",
    "{",
    "}",
    "[",
    "]",
    "<",
    ">",
    "'",
    '"',
    "`",
    "\\",
    "/",
    "_",
    "|",
    "~",
    "^",
  ];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    let podeCadastrar = true;
    let temEspecial = false;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar != senhaVar
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Insira corretamente suas informações";
      podeCadastrar = false;

      finalizarAguardar();
      return false;
    } else {
      setTimeout(sumirMensagem, 1000);
    }
    for (let i = 0; i < caracteresEspeciais.length; i++) {
      if (senhaVar.includes(caracteresEspeciais[i])) {
        temEspecial = true;
        break;
      }
    }

    if (!temEspecial) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "a senha deve conter caractere especial!";
      podeCadastrar = false;
    }
    // Enviando o valor da nova input
    if (podeCadastrar) {
      fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          // crie um atributo que recebe o valor recuperado aqui
          // Agora vá para o arquivo routes/usuario.js
          nomeServer: nomeVar,
          emailServer: emailVar,
          senhaServer: senhaVar,
        }),
      })
        .then(function (resposta) {
          console.log("resposta: ", resposta);

          if (resposta.ok) {
            cardErro.style.display = "block";
            console.log("Deu certo, redirecionando...");

            mensagem_erro.innerHTML =
              "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

            setTimeout(() => {
              window.location = "login.html";
            }, "2000");

            limparFormulario();
            finalizarAguardar();
          } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
          }
        })
        .catch(function (resposta) {
          console.log(`#ERRO: ${resposta}`);
          finalizarAguardar();
        });
    }

    return false;
  }

  function sumirMensagem() {
    nome_input.value = "";
    email_input.value = "";
    senha_input.value = "";
    confirmacao_senha_input.value = "";
  }
</script>
