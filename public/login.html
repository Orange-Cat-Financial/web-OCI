<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orange Cat</title>
    <link rel="icon" type="image/png" href="assets/icones/log-sem-fundo.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Krona+One&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="ft_e_nm">
      <a href="index.html">
        <img
          src="assets/icones/log-sem-fundo.png"
          style="height: 90px; width: 80px"
        />
      </a>
      <span>
        <span style="color: #f65d09">Orange</span>
        <span class="cat">Cat</span></span
      >
    </div>
    <div class="container_lec">
      <div class="lec_esquerdo_ipt">
        <h2>Bem vindo de volta!</h2>
        <div class="ipts_lg">
          <div class="campo">
            <span>Email:</span>
            <input type="text" id="ipt_email" placeholder="Email" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input type="password" id="ipt_senha" placeholder="Senha" />
          </div>
        </div>
        <br />
        <button onclick="entrar()">login</button>
        <a id="jaTem" href="cadastro.html"
          >Não tem uma conta?&nbsp;<b>Cadastrar</b></a
        >
      </div>
      <div class="lec_direito_img">
        <img src="assets/img/weasley_login.jpeg" />
      </div>
    </div>
  </body>
</html>
<script>
  function entrar() {
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    if (emailVar == "" || senhaVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";
    } else {
      console.log("FORM LOGIN: ", emailVar);
      console.log("FORM SENHA: ", senhaVar);

      fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          emailServer: emailVar,
          senhaServer: senhaVar,
        }),
      })
        .then(function (resposta) {
          console.log("ESTOU NO THEN DO entrar()!");

          if (resposta.ok) {
            console.log(resposta);

            resposta.json().then((json) => {
              console.log(json);
              console.log(JSON.stringify(json));
              sessionStorage.EMAIL_USUARIO = json.email;
              sessionStorage.NOME_USUARIO = json.nome;

              setTimeout(function () {
                window.location = "index.html";
              }, "300"); // apenas para exibir o loading
            });
          } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then((texto) => {
              console.error(texto);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });
    }
  }
</script>
